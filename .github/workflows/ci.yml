name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Verify Xcode
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build
        run: xcodebuild -scheme ClipMemory -configuration Debug build

      - name: Test
        run: xcodebuild -scheme ClipMemory -configuration Debug test

      - name: Test (zh-Hans locale)
        run: xcodebuild -scheme ClipMemory -configuration Debug test -testLanguage zh-Hans
