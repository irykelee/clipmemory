name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Verify Xcode
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import code-signing certificate
        env:
          CODESIGN_P12_BASE64: ${{ secrets.CODESIGN_P12_BASE64 }}
          CODESIGN_P12_PASSWORD: ${{ secrets.CODESIGN_P12_PASSWORD }}
        run: |
          set -euo pipefail
          # Self-signed "ClipMemory Self-Signed" identity — gives the Keychain
          # ACL a stable identity across versions (see project.yml). Temp
          # keychain so the runner's login keychain is untouched.
          KEYCHAIN_PW=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PW" ci-signing.keychain-db
          security list-keychains -d user -s ci-signing.keychain-db $(security list-keychains -d user | sed 's/"//g')
          security default-keychain -s ci-signing.keychain-db
          security unlock-keychain -p "$KEYCHAIN_PW" ci-signing.keychain-db
          echo "$CODESIGN_P12_BASE64" | base64 --decode > /tmp/codesign.p12
          security import /tmp/codesign.p12 -k ci-signing.keychain-db -P "$CODESIGN_P12_PASSWORD" -T /usr/bin/codesign
          rm -f /tmp/codesign.p12
          # H-3 REVERTED (v2.5.8 release): the audit proposed narrowing
          # the partition list from `apple:` wildcard to `apple:$CERT_SHA`
          # so only the imported cert's binaries can use the keychain
          # item. Two failed attempts (BSD-grep `\|` syntax error, then
          # awk `-F'"'` extracting cert name instead of SHA, then awk
          # `match()`+`substr()` extracting correct SHA but codesign
          # STILL hung 9+ min on Sparkle.framework) showed this workflow
          # is too fragile to change without dedicated runner testing.
          # Reverted to the v2.5.7 working config (`apple-tool:,apple:`).
          # The H-3 audit finding stays valid but ships as "deferred —
          # needs workflow runner sandbox" in docs/RELEASE.md.
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PW" ci-signing.keychain-db

      - name: Build Release
        run: xcodebuild -scheme ClipMemory -configuration Release build

      - name: Package and update local Cask
        run: ./Scripts/package.sh

      - name: Sign tarball and update appcast
        env:
          SPARKLE_EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"

          # Fetch the latest Sparkle signing tools via gh (authenticated —
          # anonymous api.github.com calls are rate-limited on CI runners)
          gh release download --repo sparkle-project/Sparkle --pattern 'Sparkle-*.tar.xz' --dir /tmp/sparkle-dl --clobber
          mkdir -p /tmp/sparkle
          tar -xf /tmp/sparkle-dl/Sparkle-*.tar.xz -C /tmp/sparkle

          # EdDSA-sign the tarball with the private key from repo secrets
          # H-2 fix (2026-07-20 audit): `mktemp` and `printf` honor the active
          # umask; on `macos-latest` runners that's 022, so the EdDSA private
          # key would be world-readable on disk for the few seconds the
          # signing tool runs. Setting `umask 077` plus a defensive `chmod
          # 600` before write closes that window — anyone on the same
          # ephemeral runner could otherwise exfiltrate the key and sign
          # arbitrary updates to be served from our feed. The `rm -P` at
          # the end triggers macOS's 3-pass overwrite instead of a plain
          # unlink that would leave the SSD-routed data recoverable.
          umask 077
          KEY_FILE=$(mktemp)
          printf '%s' "$SPARKLE_EDDSA_PRIVATE_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          SIGNATURE=$(/tmp/sparkle/bin/sign_update --ed-key-file "$KEY_FILE" -p Releases/ClipMemory.tar.gz)
          rm -P "$KEY_FILE"

          # Insert the new item into appcast.xml and prepare a commit for it.
          # The commit will be pushed back to the source branch the tag was
          # cut from (not always 'main' — see P0-1 fix below).
          ./Scripts/update_appcast.sh appcast.xml "$VERSION" Releases/ClipMemory.tar.gz "$SIGNATURE"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git diff --cached --quiet || git commit -m "chore: appcast item for v${VERSION} [skip ci]"
          # Drop reproducible xcodegen-regenerated files so the source-branch
          # detection runs against a clean tree (those files are not part of
          # the appcast commit anyway).
          git checkout -- .

          # P0-1 fix (per docs/RELEASE_PROCESS_AUDIT_2026-07-22.md): a tag
          # may be cut from a feature branch ahead of main (v2.5.10 was cut
          # from fix/v2.5.10-hotfix-batch which was 17 commits ahead of main
          # — `git pull --rebase origin main` then produced 30+ add/add
          # conflicts and required a force-push to recover). Detect the
          # actual source branch from the tag commit and push the appcast
          # commit there instead; --force-with-lease fails loudly if the
          # branch advanced concurrently, replacing the silent overwrite path.
          SOURCE_BRANCH="main"
          if git rev-parse --verify "${GITHUB_REF_NAME}^{commit}" >/dev/null 2>&1; then
            DETECTED=$(git branch --all --contains "${GITHUB_REF_NAME}^{commit}" \
                      2>/dev/null | sed -E 's|^[* ]+||; s|^remotes/origin/||' \
                      | grep -v 'HEAD' | head -1 || true)
            if [[ -n "$DETECTED" ]]; then
              SOURCE_BRANCH="$DETECTED"
            fi
          fi
          echo "Pushing appcast commit for ${GITHUB_REF_NAME} -> origin/${SOURCE_BRANCH}"
          git push --force-with-lease origin "HEAD:refs/heads/${SOURCE_BRANCH}"

          # Best-effort: refresh the jsDelivr mirror of the fallback feed
          curl -sf "https://purge.jsdelivr.net/gh/irykelee/clipmemory@main/appcast.xml" || true

      - name: Extract bilingual title from release notes
        id: title
        # P0-2 fix (per docs/RELEASE_PROCESS_AUDIT_2026-07-22.md): the previous
        # release left the title as the auto-generated stub "v2.5.10"
        # because softprops/action-gh-release defaults the title to the tag
        # name when `title:` is not passed. Pull the first H1 of the
        # release-notes file as the title (it is authored bilingual per
        # docs/release-notes-template.md), with a deterministic bilingual
        # fallback if the notes file is missing so release isn't blocked.
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES="docs/release-notes/v${VERSION}.md"
          if [[ -f "$NOTES" ]]; then
            BILINGUAL=$(head -1 "$NOTES" | sed 's/^# *//' | tr -d '\r')
            echo "title=${BILINGUAL}" >> "$GITHUB_OUTPUT"
            echo "Extracted title from ${NOTES}: ${BILINGUAL}"
          else
            echo "title=剪忆 ClipMemory v${VERSION} — Release / 发布 (release-notes file missing)" >> "$GITHUB_OUTPUT"
            echo "WARN: ${NOTES} not found; using placeholder title (post-push fix: gh release edit --title)"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            Releases/ClipMemory.tar.gz
            appcast.xml
          title: ${{ steps.title.outputs.title }}
          generate_release_notes: true

      - name: Update Homebrew tap
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARBALL="Releases/ClipMemory.tar.gz"
          SHA256=$(shasum -a 256 "$TARBALL" | awk '{print $1}')

          echo "Updating tap to ClipMemory v${VERSION} (sha256: ${SHA256})"

          # Clone the tap repository using a dedicated token that can write to it.
          git clone "https://${TAP_GITHUB_TOKEN}@github.com/irykelee/homebrew-clipmemory.git" tap-repo
          mkdir -p tap-repo/Casks

          cat > tap-repo/Casks/clipmemory.rb <<CASK
          cask "clipmemory" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/irykelee/clipmemory/releases/download/v#{version}/ClipMemory.tar.gz"
            name "ClipMemory"
            desc "Clipboard history manager for macOS with encryption and Quick Bar"
            homepage "https://github.com/irykelee/clipmemory"

            depends_on macos: :ventura

            auto_updates true

            app "ClipMemory.app"

            zap trash: [
              "~/Library/Application Support/ClipMemory",
              "~/Library/Preferences/com.clipmemory.app.plist",
            ],
            # C1: the root encryption key lives in the Keychain, not in files —
            # remove it too so zap leaves no key material behind.
            script: {
              executable: "/usr/bin/security",
              args: ["delete-generic-password", "-s", "com.clipmemory.app", "-a", "root-encryption-key"],
              must_succeed: false,
            }
          end
          CASK

          cd tap-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/clipmemory.rb
          git diff --cached --quiet || git commit -m "chore: update clipmemory to v${VERSION}"
          git push origin main
