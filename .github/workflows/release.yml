name: Release

on:
  push:
    tags:
      - 'v*'
  # C2 (2026-07-23 ship-review): validate release.yml changes via PR dry-run.
  # PR runs skip publish-related steps (cert import, signing, GitHub Release
  # creation, tap update) via `if: github.event_name == 'push'` guards, but
  # still run the build + test + cache steps as smoke coverage.
  pull_request:
    paths:
      - '.github/workflows/release.yml'

# REL-1 (2026-07-24 audit): concurrency group is FIXED `release`, not
# `${{ github.ref }}`. Per-ref groups let two tags pushed minutes apart run
# concurrently; both then race on the appcast `git push --force-with-lease`
# in the 'Publish appcast update' step, and the faster push silently
# truncates the slower tag's appcast commit out of the source branch. A fixed group serialises every
# tag push and every PR dry-run against the same lock.
# `cancel-in-progress: false` is intentional — never cancel a release
# mid-flight; PR runs against the same group are blocked until the in-flight
# tag finishes.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: macos-latest
    permissions:
      contents: write
    # Normal release is 10-20 min; cap at 40 so a hung step (see the
    # 2026-07-24 ci.yml modal-alert hang) fails loudly instead of running
    # up to the 6-hour GitHub default.
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        # v2.5.11 hotfix: `fetch-depth: 0` fetches all branches + tags
        # so the appcast push's source-branch detection (P0-1 fix
        # from `docs/RELEASE_PROCESS_AUDIT_2026-07-22.md`) can resolve
        # the vX.Y.Z tag's commit to its actual source branch.
        # Without this, `git branch --all --contains` returns empty
        # (runner only has the trigger ref), falls back to main, and
        # `git push --force-with-lease` fails with "stale info" when
        # the runner's local main ref doesn't match remote main.
        with:
          fetch-depth: 0

      # B1 + C4 (2026-07-23 ship-review): cache Homebrew downloads, Sparkle
      # signing tools, and Xcode DerivedData. Key on project.yml +
      # project.pbxproj + ClipMemory/Package.resolved so cache invalidates
      # automatically on code/SPM-dep changes. Restore-keys provide partial
      # hits so a single file change still benefits from prior brew + sparkle
      # downloads (which change less often than DerivedData).
      - name: Cache Homebrew + Sparkle + DerivedData
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /tmp/sparkle-dl
            /tmp/sparkle
            ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-brew-sparkle-deriveddata-v2-${{ hashFiles('project.yml', 'project.pbxproj', 'ClipMemory/Package.resolved') }}-sparkle-2.9.4
          restore-keys: |
            ${{ runner.os }}-brew-sparkle-deriveddata-v2-
            ${{ runner.os }}-brew-sparkle-deriveddata-

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Verify Xcode
        run: xcodebuild -version

      - name: Install XcodeGen
        # B1 (2026-07-23 ship-review): skip brew install when the binary is
        # already on PATH (cache hit covers Library/Caches/Homebrew but not
        # the actual install dir; this catches the case where the runner
        # already has xcodegen from a previous run).
        run: |
          if which xcodegen >/dev/null 2>&1; then
            echo "xcodegen already installed: $(xcodegen --version)"
          else
            brew install xcodegen
          fi

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import code-signing certificate
        if: github.event_name == 'push'
        env:
          CODESIGN_P12_BASE64: ${{ secrets.CODESIGN_P12_BASE64 }}
          CODESIGN_P12_PASSWORD: ${{ secrets.CODESIGN_P12_PASSWORD }}
        run: |
          set -euo pipefail
          # Self-signed "ClipMemory Self-Signed" identity — gives the Keychain
          # ACL a stable identity across versions (see project.yml). Temp
          # keychain so the runner's login keychain is untouched.
          KEYCHAIN_PW=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PW" ci-signing.keychain-db
          security list-keychains -d user -s ci-signing.keychain-db $(security list-keychains -d user | sed 's/"//g')
          security default-keychain -s ci-signing.keychain-db
          security unlock-keychain -p "$KEYCHAIN_PW" ci-signing.keychain-db
          echo "$CODESIGN_P12_BASE64" | base64 --decode > /tmp/codesign.p12
          security import /tmp/codesign.p12 -k ci-signing.keychain-db -P "$CODESIGN_P12_PASSWORD" -T /usr/bin/codesign
          rm -f /tmp/codesign.p12
          # H-3 REVERTED (v2.5.8 release): the audit proposed narrowing
          # the partition list from `apple:` wildcard to `apple:$CERT_SHA`
          # so only the imported cert's binaries can use the keychain
          # item. Two failed attempts (BSD-grep `\|` syntax error, then
          # awk `-F'"'` extracting cert name instead of SHA, then awk
          # `match()`+`substr()` extracting correct SHA but codesign
          # STILL hung 9+ min on Sparkle.framework) showed this workflow
          # is too fragile to change without dedicated runner testing.
          # Reverted to the v2.5.7 working config (`apple-tool:,apple:`).
          # The H-3 audit finding stays valid but ships as "deferred —
          # needs workflow runner sandbox" in docs/RELEASE.md.
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PW" ci-signing.keychain-db

      - name: Build Release
        # PR dry-run: the cert-import step is push-only, so PR builds must
        # sign ad-hoc (same CODE_SIGN_IDENTITY="-" as ci.yml) — otherwise
        # xcodebuild fails with "No signing certificate found".
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            xcodebuild -scheme ClipMemory -configuration Release build CODE_SIGN_IDENTITY="-"
          else
            xcodebuild -scheme ClipMemory -configuration Release build
          fi

      # B2 (2026-07-23 ship-review): run unit tests before packaging. Previously
      # the release workflow only ran `xcodebuild build` — a failing test would
      # still produce a tarball and a public GitHub Release. Now tests fail the
      # job before we burn 5-10 min on package + EdDSA sign + GitHub Release +
      # tap push.
      - name: Run tests
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            xcodebuild test -scheme ClipMemory -destination 'platform=macOS' CODE_SIGN_IDENTITY="-"
          else
            xcodebuild test -scheme ClipMemory -destination 'platform=macOS'
          fi

      - name: Package and update local Cask
        # Package is publish-adjacent (tarball + verify_package) and its
        # Release build needs the signing cert — push-only, same as the
        # other publish steps. PR dry-run coverage stops at build + tests.
        if: github.event_name == 'push'
        run: ./Scripts/package.sh

      # REL-3 (2026-07-24): this step is LOCAL-ONLY — sign the tarball and
      # insert the <item> into the working-tree appcast.xml. The git
      # commit/push of appcast.xml and the jsDelivr purge used to live here,
      # BEFORE 'Pre-release verify' and 'Create GitHub Release', so a failing
      # verify left the public feed advertising a release that was never
      # published. The publish half now runs as 'Publish appcast update'
      # after 'Create GitHub Release'.
      - name: Sign tarball and update appcast
        if: github.event_name == 'push'
        env:
          SPARKLE_EDDSA_PRIVATE_KEY: ${{ secrets.SPARKLE_EDDSA_PRIVATE_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"

          # Fetch the Sparkle signing tools via gh (authenticated — anonymous
          # api.github.com calls are rate-limited on CI runners).
          # C3 (2026-07-23 ship-review): pin to --tag 2.9.4 instead of latest.
          # Sparkle occasionally ships breaking API changes (the previous
          # `sign_update` flag set was stable for ~6 months before changing),
          # and pulling latest silently breaks CI mid-release. Pin matches
          # `packages.Sparkle.from: "2.9.4"` in project.yml. Bump both
          # together when Sparkle 2.x API breaks.
          gh release download --repo sparkle-project/Sparkle --tag 2.9.4 --pattern 'Sparkle-*.tar.xz' --dir /tmp/sparkle-dl --clobber
          mkdir -p /tmp/sparkle
          tar -xf /tmp/sparkle-dl/Sparkle-*.tar.xz -C /tmp/sparkle

          # EdDSA-sign the tarball with the private key from repo secrets
          # H-2 fix (2026-07-20 audit): `mktemp` and `printf` honor the active
          # umask; on `macos-latest` runners that's 022, so the EdDSA private
          # key would be world-readable on disk for the few seconds the
          # signing tool runs. Setting `umask 077` plus a defensive `chmod
          # 600` before write closes that window — anyone on the same
          # ephemeral runner could otherwise exfiltrate the key and sign
          # arbitrary updates to be served from our feed. The `rm -P` at
          # the end triggers macOS's 3-pass overwrite instead of a plain
          # unlink that would leave the SSD-routed data recoverable.
          umask 077
          KEY_FILE=$(mktemp)
          printf '%s' "$SPARKLE_EDDSA_PRIVATE_KEY" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          SIGNATURE=$(/tmp/sparkle/bin/sign_update --ed-key-file "$KEY_FILE" -p Releases/ClipMemory.tar.gz)
          rm -P "$KEY_FILE"

          # Insert the new item into the working-tree appcast.xml. The commit
          # + push of this change is deliberately NOT done here — see the
          # 'Publish appcast update' step after 'Create GitHub Release'.
          ./Scripts/update_appcast.sh appcast.xml "$VERSION" Releases/ClipMemory.tar.gz "$SIGNATURE"

      # C1 (2026-07-23 ship-review): pre-release verify, BEFORE the GitHub
      # Release is published. P0-3 (post-release verify) only catches
      # problems AFTER the release is public, which means a manual
      # `gh release edit` is required. This step fails the workflow before
      # any public side effect:
      #   1. release-notes file exists with bilingual sections (no stub)
      #   2. project.yml MARKETING_VERSION matches the tag (avoids the
      #      v2.2.3 class of "tag cut but version not bumped" regressions)
      #   3. no duplicate `### vX.Y.Z` block in any of the 7 lang READMEs
      #      (catches sync_readme.py dedupe regressions BEFORE publish)
      - name: Pre-release verify
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES="docs/release-notes/v${VERSION}.md"

          FAILS=0
          fail() { echo "❌ $*"; FAILS=$((FAILS+1)); }
          ok()   { echo "✅ $*"; }

          echo "=== Pre-release verify for v${VERSION} ==="

          # 1. Release notes file exists + bilingual sections.
          if [[ ! -f "$NOTES" ]]; then
            fail "${NOTES} missing — create per docs/release-notes-template.md before tagging"
          else
            grep -qE '^## 中文' "$NOTES"   || fail "${NOTES} missing '## 中文' header"
            grep -qE '^## English' "$NOTES" || fail "${NOTES} missing '## English' header"
            ok "release-notes bilingual sections present"
          fi

          # 2. project.yml MARKETING_VERSION matches the tag.
          MARKETING_VERSION=$(grep -E '^    MARKETING_VERSION:' project.yml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          if [[ "$MARKETING_VERSION" != "$VERSION" ]]; then
            fail "project.yml MARKETING_VERSION ($MARKETING_VERSION) != tag ($VERSION) — bump before tagging"
          else
            ok "project.yml MARKETING_VERSION matches tag"
          fi

          # 3. No duplicate ### vX.Y.Z block in any of 7 lang READMEs.
          for f in README.md docs/lang/README_EN.md docs/lang/README_ZH-HANT.md docs/lang/README_JA.md docs/lang/README_KO.md docs/lang/README_ES.md docs/lang/README_PT.md; do
            COUNT=$(grep -cE "^### v${VERSION}\b" "$f" || true)
            if [[ "$COUNT" -ne 1 ]]; then
              fail "${f} has ${COUNT} '### v${VERSION}' block(s) (expected 1) — re-run sync_readme.py after dedupe fix"
            else
              ok "${f} has exactly 1 v${VERSION} block"
            fi
          done

          if [[ "$FAILS" -gt 0 ]]; then
            echo ""
            echo "❌ ${FAILS} pre-release verify check(s) FAILED."
            echo "   Release was NOT published. Fix the listed issues and re-tag."
            exit 1
          fi
          echo ""
          echo "✅ All pre-release verify checks passed."

      - name: Extract bilingual title and body from release notes
        id: notes
        # P0-2 fix (per docs/RELEASE_PROCESS_AUDIT_2026-07-22.md): the previous
        # release left the title as the auto-generated stub "v2.5.10"
        # because softprops/action-gh-release defaults the title to the tag
        # name when `title:` is not passed, and the body to auto-generated
        # PR notes when `body_path:` is not passed. Pull both from
        # docs/release-notes/v${VERSION}.md (it is authored bilingual per
        # docs/release-notes-template.md), with deterministic bilingual
        # fallbacks if the notes file is missing so release isn't blocked.
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES="docs/release-notes/v${VERSION}.md"
          BODY_FILE="/tmp/clipmemory-release-body.md"
          if [[ -f "$NOTES" ]]; then
            BILINGUAL=$(head -1 "$NOTES" | sed 's/^# *//' | tr -d '\r')
            tail -n +2 "$NOTES" > "$BODY_FILE"
            echo "Extracted from ${NOTES}: ${BILINGUAL}"
          else
            BILINGUAL="剪忆 ClipMemory v${VERSION} — Release / 发布 (release-notes file missing)"
            {
              echo "# ${BILINGUAL}"
              echo ""
              echo "_Auto-placeholder: \`docs/release-notes/v${VERSION}.md\` was not present at release time. Use \`gh release edit v${VERSION} --notes-file <path>\` post-push to fill in bilingual release notes per docs/RELEASE_PUSH_CHECKLIST.md §D3._"
            } > "$BODY_FILE"
            echo "WARN: ${NOTES} not found; placeholder title + body"
          fi
          echo "title=${BILINGUAL}" >> "$GITHUB_OUTPUT"
          echo "body_path=${BODY_FILE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            Releases/ClipMemory.tar.gz
            appcast.xml
          title: ${{ steps.notes.outputs.title }}
          body_path: ${{ steps.notes.outputs.body_path }}
          # Don't auto-generate notes — we supply body_path from release-notes file.
          generate_release_notes: false

      # REL-3 (2026-07-24): appcast publish moved here, AFTER the GitHub
      # Release exists. Previously the commit/push + jsDelivr purge ran
      # inside 'Sign tarball and update appcast', before 'Pre-release
      # verify' — a failing verify then left appcast.xml publicly
      # advertising a release that was never published (Sparkle clients
      # would offer an update whose download URL 404s).
      - name: Publish appcast update
        if: github.event_name == 'push'
        env:
          # appcast 推送需要绕过 main 的分支保护（必需 PR + status check）。
          # GITHUB_TOKEN 不是 admin 无法 bypass；TAP_GITHUB_TOKEN 是所有者
          # PAT（admin），保护已设 enforce_admins: false 允许 admin 直推
          # （2026-07-25 dry-run push 实测通过）。规则集 bypass 方案不可行：
          # GitHub 不允许 personal repo 把 GitHub Actions app 设为 bypass
          # actor（HTTP 422 "must be part of the owner organization"）。
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"

          # Commit the working-tree appcast.xml updated by
          # 'Sign tarball and update appcast' and push it back to the source
          # branch the tag was cut from (not always 'main' — see P0-1 fix
          # below).
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git diff --cached --quiet || git commit -m "chore: appcast item for v${VERSION} [skip ci]"
          # Drop reproducible xcodegen-regenerated files so the source-branch
          # detection runs against a clean tree (those files are not part of
          # the appcast commit anyway).
          git checkout -- .

          # P0-1 fix (per docs/RELEASE_PROCESS_AUDIT_2026-07-22.md): a tag
          # may be cut from a feature branch ahead of main (v2.5.10 was cut
          # from fix/v2.5.10-hotfix-batch which was 17 commits ahead of main
          # — `git pull --rebase origin main` then produced 30+ add/add
          # conflicts and required a force-push to recover). Detect the
          # actual source branch from the tag commit and push the appcast
          # commit there instead; --force-with-lease fails loudly if the
          # branch advanced concurrently, replacing the silent overwrite path.
          # REL-6 (2026-07-24): deterministic source-branch resolution.
          # The old `git branch --all --contains ... | head -1` picked the
          # ALPHABETICALLY FIRST branch containing the tag commit. When a
          # tag commit sits on several branches (e.g. a hotfix branch that
          # was later merged to main) that could silently push the appcast
          # commit to the wrong branch. Now: prefer main when the tag is
          # reachable from main; use the single candidate when there is
          # exactly one; FAIL LOUDLY with the candidate list when there are
          # several non-main candidates or none — never guess.
          SOURCE_BRANCH=""
          if git rev-parse --verify "${GITHUB_REF_NAME}^{commit}" >/dev/null 2>&1; then
            CANDIDATES=$(git branch --all --contains "${GITHUB_REF_NAME}^{commit}" \
                        2>/dev/null | sed -E 's|^[* ]+||; s|^remotes/origin/||' \
                        | grep -v 'HEAD' | sort -u || true)
            if echo "$CANDIDATES" | grep -qx 'main'; then
              SOURCE_BRANCH="main"
            elif [[ "$(echo "$CANDIDATES" | grep -c . || true)" -eq 1 ]]; then
              SOURCE_BRANCH="$CANDIDATES"
            else
              echo "❌ Cannot determine a unique source branch for ${GITHUB_REF_NAME}."
              echo "   Candidate branches containing the tag commit:"
              echo "$CANDIDATES" | sed 's/^/   - /'
              echo "   Merge the tag commit to main (or re-tag from main) and re-run."
              exit 1
            fi
          else
            echo "❌ Tag commit ${GITHUB_REF_NAME}^{commit} not found locally — cannot determine source branch."
            exit 1
          fi
          echo "Pushing appcast commit for ${GITHUB_REF_NAME} -> origin/${SOURCE_BRANCH}"
          # Push with the owner's PAT (admin bypass) via extraheader — the
          # checkout's GITHUB_TOKEN credential is per-command overridden
          # without writing the PAT into the remote URL (REL-10).
          AUTH_HEADER="AUTHORIZATION: basic $(echo -n "x-access-token:${TAP_GITHUB_TOKEN}" | base64)"
          git -c "http.https://github.com/.extraheader=${AUTH_HEADER}" \
              push --force-with-lease origin "HEAD:refs/heads/${SOURCE_BRANCH}"

          # REL-6 (2026-07-24): purge the jsDelivr mirror of the branch we
          # ACTUALLY pushed, not always @main. The old code purged only
          # @main, so when the source branch was not main the branch that
          # changed kept serving a cached stale appcast while @main (whose
          # content did not change) was pointlessly re-fetched.
          #
          # Also syncing the appcast commit to main was considered and
          # REJECTED (2026-07-24): at the time main had enforce_admins: true
          # so no token could push. Since 2026-07-25 the protection allows
          # admin bypass (enforce_admins: false) and this step pushes with
          # the owner's PAT — so a main sync would now be technically
          # possible, but it is intentionally NOT done: tags are cut from
          # main in the standard flow (Scripts/release.sh enforces it), and
          # the non-main path exists only as a hotfix fallback. When the
          # source branch is not main, warn loudly that the @main fallback
          # feed stays stale until the branch is merged (Sparkle's primary
          # feed is the GitHub Release asset, which IS current), and purge
          # only the mirror of the branch just updated.
          if [[ "$SOURCE_BRANCH" != "main" ]]; then
            echo "::warning::appcast.xml was pushed to '${SOURCE_BRANCH}', not main. The jsDelivr @main fallback feed stays STALE until '${SOURCE_BRANCH}' is merged into main."
          fi
          curl -sf "https://purge.jsdelivr.net/gh/irykelee/clipmemory@${SOURCE_BRANCH}/appcast.xml" || true

      - name: Update Homebrew tap
        if: github.event_name == 'push'
        env:
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARBALL="Releases/ClipMemory.tar.gz"
          SHA256=$(shasum -a 256 "$TARBALL" | awk '{print $1}')

          echo "Updating tap to ClipMemory v${VERSION} (sha256: ${SHA256})"

          # Clone the tap repository using a dedicated token that can write to it.
          git clone "https://${TAP_GITHUB_TOKEN}@github.com/irykelee/homebrew-clipmemory.git" tap-repo
          mkdir -p tap-repo/Casks

          cat > tap-repo/Casks/clipmemory.rb <<CASK
          cask "clipmemory" do
            version "${VERSION}"
            sha256 "${SHA256}"

            url "https://github.com/irykelee/clipmemory/releases/download/v#{version}/ClipMemory.tar.gz"
            name "ClipMemory"
            desc "Clipboard history manager for macOS with encryption and Quick Bar"
            homepage "https://github.com/irykelee/clipmemory"

            depends_on macos: :ventura

            auto_updates true

            app "ClipMemory.app"

            zap trash: [
              "~/Library/Application Support/ClipMemory",
              "~/Library/Preferences/com.clipmemory.app.plist",
            ],
            # C1: the root encryption key lives in the Keychain, not in files —
            # remove it too so zap leaves no key material behind.
            script: {
              executable: "/usr/bin/security",
              args: ["delete-generic-password", "-s", "com.clipmemory.app", "-a", "root-encryption-key"],
              must_succeed: false,
            }
          end
          CASK

          cd tap-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/clipmemory.rb
          git diff --cached --quiet || git commit -m "chore: update clipmemory to v${VERSION}"
          git push origin main

      - name: Verify post-release state
        if: github.event_name == 'push'
        # P0-3 fix (per docs/RELEASE_PROCESS_AUDIT_2026-07-22.md): the v2.5.10
        # release shipped with the auto-stub title and a body that was edited
        # manually via `gh release edit` post-push — exactly the class of
        # regression this step now catches automatically. By the time this
        # runs the release IS already public; failure here does NOT unpublish
        # it, but surfaces the issue in the workflow run log so it can be
        # re-edited immediately (per docs/RELEASE_PUSH_CHECKLIST.md §D3).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e  # collect all checks into the log before exiting
          VERSION="${GITHUB_REF_NAME#v}"
          OWNER="${GH_OWNER:-irykelee}"
          REPO="${GH_REPO:-clipmemory}"
          API="repos/${OWNER}/${REPO}/releases/tags/v${VERSION}"

          FAILS=0
          note_fail() { echo "❌ $*"; FAILS=$((FAILS+1)); }
          note_ok()   { echo "✅ $*"; }

          echo "=== Post-release verification for v${VERSION} ==="

          # 1. Title is NOT the auto-stub "vX.Y.Z".
          TITLE=$(gh api "$API" --jq .name 2>/dev/null)
          if [[ -z "$TITLE" || "$TITLE" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            note_fail "title is auto-stub '$TITLE' — re-edit with: gh release edit v${VERSION} --title \"剪忆 ClipMemory v${VERSION} — <EN> / <ZH>\""
          else
            note_ok "title looks bilingual: '$TITLE'"
          fi

          # 2. Body contains a Chinese section header.
          BODY=$(gh api "$API" --jq .body 2>/dev/null)
          if echo "$BODY" | grep -qE '^## 中文'; then
            note_ok "body has '## 中文' section"
          else
            note_fail "body missing '## 中文' header — add per docs/release-notes-template.md"
          fi

          # 3. Body contains an English section header.
          if echo "$BODY" | grep -qE '^## English'; then
            note_ok "body has '## English' section"
          else
            note_fail "body missing '## English' header — add per docs/release-notes-template.md"
          fi

          # 4. Both required assets attached (per docs/RELEASE.md B3.8).
          for asset in "ClipMemory.tar.gz" "appcast.xml"; do
            ATTACHED=$(gh api "$API" --jq ".assets[] | select(.name == \"${asset}\") | .name" 2>/dev/null)
            if [[ -n "$ATTACHED" ]]; then
              note_ok "asset ${asset} attached"
            else
              note_fail "asset ${asset} missing — re-run ./Scripts/package.sh + verify"
            fi
          done

          echo ""
          if [[ "$FAILS" -gt 0 ]]; then
            echo "❌ ${FAILS} post-release verification check(s) FAILED."
            echo "   The release IS published; fix via gh release edit (see docs/RELEASE_PUSH_CHECKLIST.md §D3)."
            exit 1
          fi
          echo "✅ All post-release verification checks passed."
