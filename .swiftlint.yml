# SwiftLint Configuration for ClipMemory
# https://realm.github.io/SwiftLint/

# 规范统一策略（ratchet）：warning 按 AGENTS.md 规范值（文件≤800 行 / 函数≤50 行），
# error 按现状封顶（防继续增长）。拆分存量大文件后逐步把 error 降到规范值。
# 现状基线（2026-07-18）：最长文件 1181 行、最长函数 350 行、最长行 628 字符、最大圈复杂度 42。
#
# P1-7 (2026-07-23): baseline captures 68 pre-existing warnings
# (file_length on IntegrationTests.swift, function_body_length on
# BackupPackage.swift, cyclomatic_complexity on HotKeyManager.swift,
# line_length + trailing_newline on multiple test files). The baseline
# suppresses those from the ratchet so NEW violations introduced after
# 2026-07-23 stay visible. To regenerate the baseline after intentional
# cleanup: temporarily comment out `baseline:` below, run
# `swiftlint lint --write-baseline .swiftlint-baseline --quiet`,
# then uncomment. The two-step dance is required because --write-baseline
# will not overwrite an existing baseline file (it tries to decode it
# first to merge, and chokes if the new content is different).
baseline: .swiftlint-baseline

disabled_rules:
  - function_parameter_count
  - force_cast
  - closure_spacing
  - multiline_parameters
  - switch_case_alignment
  - type_body_length  # 与 file_length 重复，保留禁用（大类型由 file_length 兜底）

# 启用的规则
opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - sorted_first_last
  - redundant_nil_coalescing
  - contains_over_first_not_nil
  - fallthrough
  - fatal_error_message
  - trailing_whitespace

# 排除的文件/目录
excluded:
  - .build
  - .swiftpm
  - Pods
  - ClipMemory.xcodeproj
  - "**/*.lproj"
  - "**/Fonts/"
  - "**/Resources/"
  - Carthage
  - Modules
  - Vendor
  - "**/DerivedSources/"
  - "**/XCBuildData/"

# Reporter: xcode 输出到 Xcode 的 Issue Navigator
reporter: "xcode"

# 规则参数
file_length:
  warning: 800
  error: 1250
function_body_length:
  warning: 50
  error: 400
line_length:
  warning: 150
  error: 700
cyclomatic_complexity:
  warning: 10
  error: 45

identifier_name:
  min_length:
    warning: 1
  max_length:
    warning: 40
    error: 60
  excluded:
    - id
    - x
    - y
    - w
    - h
    - i
    - j
    - k
    - to
    - of
    - in
    - on
    - at
    - KeyCaptureView
    - MacOSMenuItem
    - NotificationCenter
